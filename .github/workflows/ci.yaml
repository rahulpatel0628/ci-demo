name: CI

on:
  push:
    branches: main
  
  pull_request:

jobs:
  linting:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        version: ['3.9']

    steps:
      - name: code checkout
        uses: actions/checkout@v3

      - name: python setup
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.version }}

      - name: install flake8
        run:
          python -m pip install flake8

      - name: run flake8
        run:
          flake8 app.py
  testing:
    runs-on: ubuntu-latest

    steps:
      - name: code checkout
        uses: actions/checkout@v3
      
      - name: python setup
        uses: actions/setup-python@v2
        with:
          python-version: 3.10

      - name: run unittest
        run:
          python -m unittest discover -s tests
